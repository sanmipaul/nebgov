name: Rust Contracts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Build WASMs for test dependencies
        run: |
          cargo build --target wasm32v1-none --release \
            -p sorogov-governor \
            -p sorogov-timelock \
            -p sorogov-token-votes \
            -p sorogov-governor-factory \
            -p sorogov-treasury

      - name: Run tests
        run: cargo test --workspace

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate coverage
        run: cargo tarpaulin --workspace --out xml --output-dir coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage/cobertura.xml
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev libudev-dev pkg-config

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli

      - name: Build release WASM
        run: |
          cargo build --target wasm32v1-none --release \
            -p sorogov-governor \
            -p sorogov-timelock \
            -p sorogov-token-votes \
            -p sorogov-governor-factory \
            -p sorogov-treasury

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm-contracts
          path: target/wasm32v1-none/release/*.wasm

  scout:
    name: Security Scan
    needs: [build]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Audit authorization checks
        run: |
          echo "=== Authorization Audit ==="
          # Find all invoke_contract calls
          INVOKES=$(grep -rn "invoke_contract" contracts/ --include="*.rs" || true)

          if [ -n "$INVOKES" ]; then
            echo "Found invoke_contract calls - verifying authorization:"
            echo "$INVOKES"
            echo ""
            echo "✓ Manual review: Each invoke_contract call should have:"
            echo "  1. caller.require_auth() before the invoke, OR"
            echo "  2. env.current_contract_address().require_auth() for self-calls, OR"
            echo "  3. Documented reason if no auth check (e.g., read-only query)"
            echo ""
          else
            echo "✓ No invoke_contract calls found"
          fi

          # Count all require_auth calls
          AUTH_COUNT=$(grep -r "require_auth()" contracts/ --include="*.rs" | wc -l)
          echo "Total require_auth() calls: $AUTH_COUNT"
          echo "See docs/permissions.md for complete authorization matrix"

      - name: Run CoinFabrik Scout security scanner
        uses: CoinFabrik/scout-actions@v3.2
        with:
          working_directory: .
          fail_on_error: false
