name: Feature Request
description: Suggest a new feature or improvement for NebGov
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please answer the questions below.
  - type: textarea
    id: problem_statement
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you evaluated
    validations:
      required: false
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of NebGov would this impact?
      options:
        - contracts
        - sdk
        - frontend
        - indexer
        - backend
    validations:
      required: true
  - type: dropdown
    id: complexity
    attributes:
      label: Complexity Estimate
      description: Estimated implementation effort
      options:
        - trivial
        - medium
        - high
    validations:
      required: true
