name: Bug Report
description: Report a bug in NebGov contracts, SDK, frontend, or indexing services
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line summary of the issue
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of NebGov is affected?
      options:
        - contracts
        - sdk
        - frontend
        - indexer
        - backend
    validations:
      required: true
  - type: dropdown
    id: network
    attributes:
      label: Network
      description: Which Stellar network is affected?
      options:
        - testnet
        - mainnet
        - local
        - n/a
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Deploy governor contract with...
        2. Call propose() with...
        3. Observe error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true
  - type: input
    id: contract_addresses
    attributes:
      label: Contract Addresses
      description: On-chain contract addresses relevant to the issue
      placeholder: |
        Governor: G...\nVotes: G...\nTimelock: G...
    validations:
      required: false
  - type: input
    id: transaction_hash
    attributes:
      label: Transaction Hash
      description: Transaction hash if available
    validations:
      required: false
